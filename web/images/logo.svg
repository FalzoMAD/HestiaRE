<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 119.9 144">
  <defs>
    <!-- Anthrazit vorne (heller): linker Strich, sichtbare Hauptflaeche -->
    <linearGradient id="gAnthraciteFront" x1="0%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#55585e"/>
      <stop offset="100%" stop-color="#2b2d31"/>
    </linearGradient>
    <!-- Anthrazit aussen (dunkler): Rand-/Schattenebene des linken Strichs -->
    <linearGradient id="gAnthraciteOuter" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#2b2d31"/>
      <stop offset="100%" stop-color="#131417"/>
    </linearGradient>
    <!-- Dunkelgruen (Lila-Analog): Querbalken + Haken rechts unten -->
    <linearGradient id="gGreenDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f8a44"/>
      <stop offset="100%" stop-color="#173d1e"/>
    </linearGradient>
    <!-- Hellgruen (Pink-Analog): senkrechter rechter Abstrich -->
    <linearGradient id="gGreenLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ed957"/>
      <stop offset="100%" stop-color="#3cae52"/>
    </linearGradient>
    <!-- Seam: schmaler heller Verlaufskoerper auf der Grenze dunkel/hell-Anthrazit -->
    <linearGradient id="gSeam" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e4e6ea" stop-opacity="0.5"/>
    </linearGradient>
  </defs>

  <!-- [1] Querbalken (dunkelgruen); rechte Abwaertskante leicht hochgezogen, damit unter dem grauen Cusp kein Sliver hervorlugt -->
  <path d="M23.8 125s8.4-3.6 26.2-39.3c4-8 6.7-13.2 10.8-16.8 0 0 6.9-.5 3.6 10.7-3.3 11.2-4.5 29.8-4.5 29.8s-10.3 19-11.7 20.5c-1.4 1.5-6.5 9.4-14.8 8.9S23.8 125 23.8 125z" fill="url(#gGreenDark)"/>

  <!-- [2] Linker Strich, vordere (hellere) Anthrazit-Ebene.
       MARKER B: untere Spitze (grauer Cusp) jetzt bei (51.3, 126.0) - auf den gruenen Balken verschoben -->
  <path d="M4.5 0C30-2 33 15 34.7 56.5c-3.5 61.7 4.7 85.4 16.6 69.5 0 0-12 26.4-35.9 12.2C1.3 129.9.6 115.6.7 98.4c0 0 4.5-56.2 3.8-98.4z" fill="url(#gAnthraciteFront)"/>

  <!-- [3] Dunkelgruener Haken rechts unten.
       MARKER D: Spitze bei (117.3, 132.9), Nase bis (117.2, 134.4);
       unterer Rand (Lippe) laeuft bis (104.5, 142.3) nach rechts und steigt erst dort an;
       Unterseite schwingt via Kontrolle (90, 148.8) zurueck zum Start -->
  <path d="M83.2 116.6c8.4 23.4 23.8 19.6 34.1 16.3c.2.5.1 1-.1 1.5c-3.7 3.4 -8.2 6.5 -12.7 7.9c-14.5 6.5 -19.8 -14.3 -21.3 -25.7z" fill="url(#gGreenDark)"/>

  <!-- [4] Hellgruener Abstrich.
       MARKER C: Spitze exakt bei (104.5, 142.3) = Startpunkt des dunkelgruenen Anstiegs -->
  <path d="M78.2 65.6c-8.2-5.8-18 3.9-18 3.9 8.7-3.4-3.4 19.5.7 47.1c3.6 19.7 15.1 25.3 23.6 25.2c7.5 0.5 15.0 0.8 20.0 0.5c-37.0 -5.5 -11.2 -65.8 -26.3 -76.7z" fill="url(#gGreenLight)"/>

  <!-- [5] Linker Strich, aeussere (dunklere) Anthrazit-Ebene.
       Cusp synchron mit [2] auf (51.2, 126.1) verschoben -->
  <path d="M16.5 74.6C22 40 18 8 4.5 0 6.8 37.8 1.4 98.4 1.4 98.4c-.1 17.9.6 31.5 14.6 39.9C39.2 152.4 51.2 126.1 51.2 126.1c-15.6 29.4-41.1 16.2-34.7-51.5z" fill="url(#gAnthraciteOuter)"/>

  <!-- [6] Seam: spitz auslaufender Verlaufskoerper.
       MARKER A: untere Spitze bei (50.9, 126.5) - endet auf der gruenen Kante des Balkens.
       (Als gesampelte Polyline generiert; Breitenprofil 0 -> 1.5 -> 0) -->
  <path d="M4.5 0.0L6.4 1.5L8.1 3.2L9.7 5.3L11.2 7.7L12.5 10.3L13.7 13.2L14.7 16.4L15.7 19.9L16.4 23.5L17.1 27.4L17.5 31.5L17.9 35.7L18.1 40.2L18.2 44.7L18.1 49.5L17.9 54.3L17.6 59.2L17.1 64.2L16.5 69.3L15.8 74.5L15.0 84.3L14.8 93.3L14.9 101.5L15.4 108.9L16.3 115.5L17.5 121.3L19.1 126.4L20.9 130.7L22.9 134.3L25.1 137.2L27.6 139.3L30.2 140.7L32.8 141.4L35.6 141.3L38.3 140.5L41.0 139.0L43.6 136.8L46.2 134.0L48.6 130.6L50.9 126.5L50.9 126.5L48.4 130.5L45.9 133.8L43.3 136.5L40.7 138.5L38.0 139.8L35.5 140.5L32.9 140.5L30.5 139.8L28.2 138.5L26.0 136.4L23.9 133.7L22.0 130.2L20.3 126.0L18.9 121.0L17.7 115.2L16.9 108.7L16.4 101.4L16.2 93.3L16.5 84.4L17.2 74.7L18.0 69.5L18.6 64.4L19.1 59.3L19.4 54.4L19.6 49.5L19.6 44.7L19.4 40.1L19.2 35.7L18.8 31.4L18.2 27.2L17.5 23.3L16.6 19.6L15.6 16.2L14.5 13.0L13.2 10.0L11.7 7.4L10.1 5.0L8.4 3.0L6.5 1.3L4.5 0.0z" fill="url(#gSeam)"/>
</svg>