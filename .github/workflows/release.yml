name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      # A9 guard: the v-* allowlist that drives the install-time symlink reconcile
      # (share/hestia/v-commands.list) must match the committed v-* symlinks. A
      # stale list prunes valid symlinks on install (destructive), so a drifted
      # list must never ship. Fail the release if it is out of sync (#123).
      - name: Verify v-commands.list matches committed v-* symlinks
        run: |
          expected=$(git ls-files 'bin/v-*' | sed 's|bin/||' | LC_ALL=C sort)
          committed=$(LC_ALL=C sort share/hestia/v-commands.list)
          if [ "$expected" != "$committed" ]; then
            echo "ERROR: share/hestia/v-commands.list is out of sync with bin/v-*." >&2
            echo "       Regenerate: git ls-files 'bin/v-*' | sed 's|bin/||' | LC_ALL=C sort > share/hestia/v-commands.list" >&2
            diff <(echo "$committed") <(echo "$expected") || true
            exit 1
          fi

      - name: Build tarball
        run: |
          # VERSION aus dem Tag in die Datei schreiben
          echo "${VERSION}" > VERSION
          
          mkdir -p dist/hestiare-${VERSION}
          rsync -a \
            --exclude='.git*' \
            --exclude='dist' \
            . dist/hestiare-${VERSION}/
          tar -czf dist/hestiare-${VERSION}.tar.gz -C dist hestiare-${VERSION}

      - name: Create Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          files: dist/hestiare-${{ env.VERSION }}.tar.gz
          generate_release_notes: false
          body: |
            HestiaRE ${{ env.VERSION }}

            Install:
              curl -fsSL https://hestiare.com/install.sh 
              bash install.sh
