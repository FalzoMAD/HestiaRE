# HestiaRE — internal Roundcube listener (#205). Deployed to
# /etc/caddy/webmail-roundcube.conf by h-add-sys-roundcube (picked up by the
# Caddyfile's top-level `import /etc/caddy/*.conf`), removed by
# h-delete-sys-roundcube.
#
# Loopback-only, plain HTTP: the ONLY consumers are the per-mail-domain
# webmail.<domain> vhosts on nginx/apache, which reverse-proxy here with the
# Host header passed through (so Roundcube sees the customer domain). TLS
# terminates at those vhosts with the customer-domain LE cert. No forward_auth
# on purpose — the auth gate is Roundcube's own IMAP login (same model as
# phpMyAdmin/Adminer on :8083).
#
# 127.0.0.1 port instead of a unix socket: caddy 2.6.x (OS package) cannot set
# a socket mode on `bind` (the |mode suffix lands in the filename), and the
# default perms are not connectable for the www-data proxy workers. A loopback
# port is equivalent in exposure (local processes only) and works identically
# behind nginx proxy_pass and apache ProxyPass (apache-only case).
# Port 8090: above the fixed web-stack ports (apache 8080/8443, nginx 8081/8084)
# and below the customer PHP-FPM backend range, which h-add-web-domain-backend
# allocates from 9000 upward — so it can never collide with a customer vhost.
#
# `http://:8090` + `bind 127.0.0.1`, NOT `http://127.0.0.1:8090`: a host in the
# site address makes Caddy match ONLY that Host header, so a proxied request
# carrying `Host: webmail.<domain>` would match no site and get an empty 200.
# Matching any host but binding to loopback keeps it private while accepting the
# customer-domain Host the vhosts pass through.
http://:8090 {
	bind 127.0.0.1
	root * /var/lib/roundcube/public_html

	log {
		output file /var/log/caddy/access.log
		format json
	}

	header {
		X-Content-Type-Options nosniff
		X-Frame-Options SAMEORIGIN
		-Server
	}

	encode gzip

	request_body {
		max_size 256m
	}

	php_fastcgi unix//run/hestia-webmail-rc.sock
	file_server
}
