# HestiaRE — internal SnappyMail listener (#205). Deployed to
# /etc/caddy/webmail-snappymail.conf by h-add-sys-snappymail (picked up by the
# Caddyfile's top-level `import /etc/caddy/*.conf`), removed by
# h-delete-sys-snappymail.
#
# Loopback-only, plain HTTP: consumed exclusively by the per-mail-domain
# webmail.<domain> vhosts (nginx proxy_pass / apache ProxyPass in the
# apache-only case) with Host passthrough; TLS terminates there with the
# customer-domain LE cert. No forward_auth — SnappyMail's own IMAP login is the
# gate. Port instead of unix socket: see webmail-roundcube.conf header.
# Port 8091: sibling of roundcube's 8090 — above the fixed web-stack ports,
# below the customer PHP-FPM backend range (9000+).
# `http://:8091` + `bind 127.0.0.1` (match any Host, listen loopback only):
# see webmail-roundcube.conf for why a host in the site address breaks proxying.
http://:8091 {
	bind 127.0.0.1
	root * /var/lib/snappymail

	log {
		output file /var/log/caddy/access.log
		format json
	}

	header {
		X-Content-Type-Options nosniff
		X-Frame-Options SAMEORIGIN
		-Server
	}

	encode gzip

	request_body {
		max_size 256m
	}

	php_fastcgi unix//run/hestia-webmail-sm.sock
	file_server
}
