# HestiaRE admin panel — HTTPS on port 8083
# Deployed to /etc/caddy/hestia.conf

https://:8083 {
    tls /usr/local/hestia/ssl/certificate.crt /usr/local/hestia/ssl/certificate.key

    root * /usr/local/hestia/web

    log {
        output file /var/log/hestia/caddy-access.log
        format json
    }

    header {
        X-Content-Type-Options nosniff
        X-Frame-Options SAMEORIGIN
        X-XSS-Protection "1; mode=block"
        -Server
    }

    encode gzip

    request_body {
        max_size 1g
    }

    handle_errors {
        root * /usr/local/hestia/web
        @5xx expression `{http.error.status_code} >= 500`
        handle @5xx {
            rewrite * /error/50x.html
            file_server
        }
        @410 expression `{http.error.status_code} == 410`
        handle @410 {
            rewrite * /error/410.html
            file_server
        }
        handle {
            rewrite * /error/404.html
            file_server
        }
    }

    # File manager — optional component, no-op when not installed
    handle /fm/* {
        uri strip_prefix /fm
        root * /usr/local/hestia/web/fm/dist
        reverse_proxy *.php unix//run/hestia-php.sock {
            transport fastcgi {
                split .php
                env SCRIPT_FILENAME /usr/local/hestia/web/fm/dist/index.php
            }
        }
        file_server
    }

    # PHP application with X-Accel-Redirect support
    # (used by download/backup, download/database, download/site, list/rrd)
    route {
        # Redirect bare directory paths to trailing-slash form when index.php exists
        @canonicalPath {
            file {
                try_files {path}/index.php
            }
            not path */
        }
        redir @canonicalPath {http.request.uri.path}/

        # Resolve directory requests to their index.php
        @indexFiles file {
            try_files {path} {path}/index.php index.php
            split_path .php
        }
        rewrite @indexFiles {http.matchers.file.relative}

        # FastCGI — intercept X-Accel-Redirect to serve files directly
        reverse_proxy *.php unix//run/hestia-php.sock {
            transport fastcgi {
                split .php
                read_timeout 600s
            }
            @accel header X-Accel-Redirect *
            handle_response @accel {
                root * /
                rewrite * {http.response.header.X-Accel-Redirect}
                file_server
            }
        }
    }

    file_server
}
