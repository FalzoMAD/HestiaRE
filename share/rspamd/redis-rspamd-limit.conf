# HestiaRE rspamd-bayes limit — appended to /etc/redis/redis.conf when Redis is
# installed solely as rspamd's Bayes backend (DB_REDIS not selected). Hard-caps
# memory so the daemon stays a small companion (~16 MB idle RSS, 64 MB ceiling);
# Bayes tokens carry a TTL, so volatile-ttl evicts the oldest learning data
# first if the cap is ever reached.
#
# Lifecycle contract: h-add-sys-redis (promoting Redis to a general service)
# must REMOVE this block; h-delete-sys-redis must RE-ADD it (demote) instead of
# uninstalling Redis while rspamd is installed.
maxmemory 64mb
maxmemory-policy volatile-ttl
