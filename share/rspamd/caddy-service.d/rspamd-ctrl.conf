# HestiaRE — deployed by h-add-sys-rspamd to
# /etc/systemd/system/caddy.service.d/rspamd-ctrl.conf, removed by
# h-remove-sys-rspamd.
#
# Grants the Caddy PROXY process (and only it) the _rspamd-ctrl group so it can
# reverse-proxy the rspamd controller socket for the in-panel UI. This is a
# process-scoped grant via systemd — the caddy USER is deliberately NOT added
# to the group in /etc/group, so the app FPM pools that also run as caddy
# (phpMyAdmin/phpPgAdmin/Roundcube) do NOT inherit it through initgroups() and
# cannot reach the controller past forward_auth (#341).
#
# Works because caddy.service uses User=caddy, so systemd sets the process
# credentials (SupplementaryGroups is applied); PHP-FPM instead derives a
# worker's groups from /etc/group via initgroups(), which this does not touch.
[Service]
SupplementaryGroups=_rspamd-ctrl
