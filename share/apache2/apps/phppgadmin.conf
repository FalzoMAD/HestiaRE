# phpPgAdmin — reverse-proxied to the Panel-Caddy (:8083), which serves it
# from a dedicated caddy FPM pool. Included per customer domain vhost.
# %pga_alias% = DB_PGA_ALIAS. Requires mod_proxy, mod_proxy_http, mod_ssl.
<IfModule mod_proxy.c>
    SSLProxyEngine on
    SSLProxyVerify none
    SSLProxyCheckPeerName off
    SSLProxyCheckPeerCN off
    ProxyPass        /%pga_alias% https://127.0.0.1:8083/%pga_alias%
    ProxyPassReverse /%pga_alias% https://127.0.0.1:8083/%pga_alias%
</IfModule>
