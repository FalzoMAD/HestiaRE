# phpMyAdmin — reverse-proxied to the Panel-Caddy (:8083), which serves it
# from a dedicated caddy FPM pool. Included per customer domain vhost.
# %pma_alias% = DB_PMA_ALIAS. Requires mod_proxy, mod_proxy_http, mod_ssl.
<IfModule mod_proxy.c>
    SSLProxyEngine on
    SSLProxyVerify none
    SSLProxyCheckPeerName off
    SSLProxyCheckPeerCN off
    ProxyPass        /%pma_alias% https://127.0.0.1:8083/%pma_alias%
    ProxyPassReverse /%pma_alias% https://127.0.0.1:8083/%pma_alias%
</IfModule>
