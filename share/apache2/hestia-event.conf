# Server-wide fallback for PHP requests under mpm_event.
#
# There is no shared catch-all PHP-FPM pool anymore (the www.sock pool was
# removed in #397). Every web domain's vhost sets its own per-domain
# SetHandler (templates/web/apache2/php-fpm/*) and re-grants access with
# "Require all granted". A .php that reaches apache without such a per-domain
# override is unclaimed — deny it here rather than execute it in a shared
# context or let apache serve it as source. This mirrors the hardening in
# Debian's own php-fpm apache snippet.
<IfModule mpm_event_module>
    <FilesMatch \.php$>
         Require all denied
    </FilesMatch>
</IfModule>
