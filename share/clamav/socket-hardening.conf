# HestiaRE-Härtung für clamav-daemon.socket (Drop-in).
# clamd wird per systemd-Socket-Aktivierung gestartet; damit erzeugt die
# .socket-Unit /run/clamav/clamd.ctl und ihr SocketMode gewinnt — LocalSocketMode
# aus clamd.conf wird IGNORIERT. Ohne diesen Drop-in ist der Socket 0666
# (world-writable). 0660 + SocketGroup=clamav (Upstream setzt die Gruppe schon)
# beschränkt den Zugriff auf die clamav-Gruppe; Debian-exim tritt ihr bei.
[Socket]
SocketMode=0660
