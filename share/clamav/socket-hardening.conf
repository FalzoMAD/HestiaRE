# HestiaRE hardening drop-in for clamav-daemon.socket.
# clamd is socket-activated, so the .socket unit owns /run/clamav/clamd.ctl and its
# SocketMode wins — clamd.conf's LocalSocketMode is ignored. Without this the socket
# is 0666 (world-writable); 0660 limits it to the clamav group (Debian-exim joins it).
[Socket]
SocketMode=0660
