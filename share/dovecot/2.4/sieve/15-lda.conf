########################################
# Dovecot conf file modified by Hestia #
########################################

# Sieve variant, deployed by h-add-sys-sieve. exim hands local mail to
# dovecot-lda (dovecot_virtual_delivery transport), which runs the account's
# sieve scripts at delivery time. The auth-master socket is used for the
# userdb lookup (-d), see 10-master.conf.

protocol lda {
  mail_plugins {
    quota = yes
    sieve = yes
  }
  # Defer (not bounce) when the mailbox is over quota, so the sieve delivery
  # path matches exim's appendfile transports (local_delivery /
  # local_spam_delivery, which defer on quota) — enabling the addon must not
  # change over-quota behaviour. exim's dovecot_virtual_delivery transport uses
  # return_fail_output so this EX_TEMPFAIL surfaces as a defer.
  quota_full_tempfail = yes
  auth_socket_path = /var/run/dovecot/auth-master
}
