########################################
# Dovecot conf file modified by Hestia #
########################################

# Sieve variant, deployed by h-add-sys-sieve. exim hands local mail to
# dovecot-lda (dovecot_virtual_delivery transport), which runs the account's
# sieve scripts at delivery time. The auth-master socket is used for the
# userdb lookup (-d), see 10-master.conf.

protocol lda {
  mail_plugins {
    quota = yes
    sieve = yes
  }
  auth_socket_path = /var/run/dovecot/auth-master
}
