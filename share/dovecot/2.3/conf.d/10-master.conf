  inet_listener pop3s {
  }
}


service imap {
}

service pop3 {
}

service auth {
  extra_groups = mail

  unix_listener auth-client {
    group = mail
    mode = 0660
    user = dovecot
  }

  # userdb lookups for dovecot-lda (sieve addon, exim dovecot_virtual_delivery
  # transport); harmless when sieve is off
  unix_listener auth-master {
    group = mail
    mode = 0660
    user = dovecot
  }
  user = dovecot
}
