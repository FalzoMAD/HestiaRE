; HestiaRE — phpPgAdmin FPM pool (served by Panel-Caddy).
; Runs as the caddy user; the socket is consumed by Caddy's /phppgadmin route
; (see install/deb/caddy/phppgadmin.tpl, deployed via h-change-sys-db-alias).
; NOTE: php-fpm parses pool configs as PHP-INI — comments MUST use ';' not '#'.
[phppgadmin]
listen = /run/hestia-pga.sock
listen.owner = caddy
listen.group = caddy
listen.mode = 0660

user = caddy
group = caddy

pm = ondemand
pm.max_children = 4
pm.max_requests = 1000
pm.process_idle_timeout = 10s

env[PATH] = /usr/local/bin:/usr/bin:/bin
env[LANG] = en_US.UTF-8

catch_workers_output = yes
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/hestia-php-fpm.log
php_admin_value[memory_limit] = 256M
php_admin_value[max_execution_time] = 300
