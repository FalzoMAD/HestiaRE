; HestiaRE — Adminer FPM pool (served by Panel-Caddy).
; Runs as the caddy user; the socket is consumed by Caddy's /adminer route
; (share/panel-caddy/apps/adminer.tpl, deployed via h-add-sys-adminer).
; NOTE: php-fpm parses pool configs as PHP-INI — comments MUST use ';' not '#'.
;
; Adminer runs in the same caddy-FPM context as phpMyAdmin/Roundcube. It does
; NOT get the _rspamd-ctrl group (that grant is process-scoped to the Caddy
; proxy, not the caddy user — see #341), so this pool cannot reach the rspamd
; controller socket.
[adminer]
listen = /run/hestia-adminer.sock
listen.owner = caddy
listen.group = caddy
listen.mode = 0660

user = caddy
group = caddy

pm = ondemand
pm.max_children = 4
pm.max_requests = 1000
pm.process_idle_timeout = 10s

env[PATH] = /usr/local/bin:/usr/bin:/bin
env[LANG] = en_US.UTF-8

catch_workers_output = yes
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/hestia-php-fpm.log
php_admin_value[memory_limit] = 256M
php_admin_value[post_max_size] = 256M
php_admin_value[upload_max_filesize] = 256M
php_admin_value[max_execution_time] = 300
php_admin_value[max_input_time] = 300
php_admin_value[session.save_path] = /var/lib/adminer/tmp
php_admin_value[upload_tmp_dir] = /var/lib/adminer/tmp
php_admin_value[sys_temp_dir] = /var/lib/adminer/tmp
