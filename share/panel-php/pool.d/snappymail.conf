; HestiaRE — SnappyMail FPM pool (served by the Panel-Caddy's internal webmail
; listener, see share/panel-caddy/webmail-snappymail.conf; deployed by
; h-add-sys-snappymail, removed by h-delete-sys-snappymail, #205).
; Runs as the caddy user — matches the caddy:caddy data dir (/etc/snappymail/data)
; that h-add-sys-snappymail creates. This is what fixes W7 (#234): the old model
; rendered caddy-owned data with a www-data pool -> "Permission denied!".
; NOTE: php-fpm parses pool configs as PHP-INI — comments MUST use ';' not '#'.
[snappymail]
listen = /run/hestia-webmail-sm.sock
listen.owner = caddy
listen.group = caddy
listen.mode = 0660

user = caddy
group = caddy

pm = ondemand
pm.max_children = 6
pm.max_requests = 1000
pm.process_idle_timeout = 10s

env[PATH] = /usr/local/bin:/usr/bin:/bin
env[LANG] = en_US.UTF-8

catch_workers_output = yes
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/hestia-php-fpm.log
php_admin_value[memory_limit] = 256M
php_admin_value[post_max_size] = 256M
php_admin_value[upload_max_filesize] = 256M
php_admin_value[max_execution_time] = 300
php_admin_value[max_input_time] = 300
; Dedicated tmp next to the install dir; created + chowned caddy:caddy by
; h-add-sys-snappymail (SnappyMail's own state lives in /etc/snappymail/data).
php_admin_value[session.save_path] = /var/lib/snappymail/tmp
php_admin_value[upload_tmp_dir] = /var/lib/snappymail/tmp
php_admin_value[sys_temp_dir] = /var/lib/snappymail/tmp
