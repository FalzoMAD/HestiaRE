; HestiaRE — Roundcube FPM pool (served by the Panel-Caddy's internal webmail
; listener, see share/panel-caddy/webmail-roundcube.conf; deployed by
; h-add-sys-roundcube, removed by h-delete-sys-roundcube, #205).
; Runs as the caddy user — matches the root:caddy config ownership and the
; caddy:caddy log dir that h-add-sys-roundcube sets up. This is what fixes the
; old model where a www-data pool rendered caddy-owned app state (W7/#234).
; NOTE: php-fpm parses pool configs as PHP-INI — comments MUST use ';' not '#'.
[roundcube]
listen = /run/hestia-webmail-rc.sock
listen.owner = caddy
listen.group = caddy
listen.mode = 0660

user = caddy
group = caddy

pm = ondemand
pm.max_children = 6
pm.max_requests = 1000
pm.process_idle_timeout = 10s

env[PATH] = /usr/local/bin:/usr/bin:/bin
env[LANG] = en_US.UTF-8

catch_workers_output = yes
php_admin_flag[log_errors] = on
php_admin_value[error_log] = /var/log/hestia-php-fpm.log
php_admin_value[memory_limit] = 256M
php_admin_value[post_max_size] = 256M
php_admin_value[upload_max_filesize] = 256M
php_admin_value[max_execution_time] = 300
php_admin_value[max_input_time] = 300
; Roundcube's own temp dir (Debian package layout); chowned caddy:caddy by
; h-add-sys-roundcube. Sessions live in the roundcube DB; these cover PHP-level
; session bootstrap, uploads and sys temp.
php_admin_value[session.save_path] = /var/lib/roundcube/temp
php_admin_value[upload_tmp_dir] = /var/lib/roundcube/temp
php_admin_value[sys_temp_dir] = /var/lib/roundcube/temp
