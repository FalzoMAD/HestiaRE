[panel]
listen = /run/hestia-php.sock
listen.owner = hestia
; Socket group is caddy: caddy (the panel reverse proxy) is the sole client of this
; socket, so the group is set to caddy directly — no need to add caddy to hestia's group.
listen.group = caddy
listen.mode = 0660

user = hestia
group = hestia

pm = ondemand
pm.max_children = 4
pm.max_requests = 1000
pm.process_idle_timeout = 10s

; HESTIA must be a literal path, not $HESTIA: php-fpm clears the master process
; environment on startup, so env[HESTIA] = $HESTIA would expand to empty and the
; panel would build paths as /web/... instead of /usr/local/hestia/web/... → 502.
; The install root is fixed at /usr/local/hestia (see CLAUDE.md).
env[PATH] = /usr/local/bin:/usr/bin:/bin
env[TMP] = /tmp
env[TMPDIR] = /tmp
env[TEMP] = /tmp
env[HESTIA] = /usr/local/hestia
env[LANG] = en_US.UTF-8

; PHP settings (session, opcache, limits, disable_functions) live in the panel's
; own php.ini (share/panel-php/fpm/php.ini), loaded by bin/hestia-php-fpm via -c.
; No php_admin_value overrides are needed here: the panel FPM is isolated from the
; customer PHP config and carries its own ini.
catch_workers_output = yes
