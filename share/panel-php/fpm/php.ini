; HestiaRE panel FPM PHP settings — loaded via bin/hestia-php-fpm (-c this file).
; Deployed to /etc/php/hestia/fpm/php.ini.
;
; The panel runs its own hestia-php service on the same PHP version as customers
; but MUST stay isolated from customer PHP config: it must not inherit the
; customer FPM hardening from /etc/php/<version>/fpm/php.ini (which disables
; exec/system/shell_exec/... — see bin/h-add-web-php), because the panel shells
; out to the h-* CLI (web/inc/main.php calls exec()). Pointing the panel master
; at this dedicated ini via -c decouples it; extensions still load from the
; version's conf.d scan dir. This is why no php_admin_value overrides are needed
; in pool.d/panel.conf. Mirror of the CLI ini (cli/php.ini).

[PHP]
; Panel is trusted code (runs as hestia, calls h-* via sudo) — exec must stay
; enabled. Only pcntl_* remain disabled, matching the customer CLI hardening.
disable_functions = pcntl_alarm,pcntl_fork,pcntl_waitpid,pcntl_wait,pcntl_wifexited,pcntl_wifstopped,pcntl_wifsignaled,pcntl_wifcontinued,pcntl_wexitstatus,pcntl_wtermsig,pcntl_wstopsig,pcntl_signal,pcntl_signal_dispatch,pcntl_get_last_error,pcntl_strerror,pcntl_sigprocmask,pcntl_sigwaitinfo,pcntl_sigtimedwait,pcntl_exec,pcntl_getpriority,pcntl_setpriority

expose_php = Off
display_errors = Off
log_errors = On
error_log = /var/log/hestia-php-fpm.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

memory_limit = 256M
post_max_size = 256M
upload_max_filesize = 256M
max_execution_time = 300
max_input_time = 300

[Session]
session.name = HESTIASID
session.save_path = /usr/local/hestia/.sessions
session.cookie_httponly = On
session.cookie_secure = On
session.use_strict_mode = On
session.cookie_samesite = "Strict"

[opcache]
opcache.enable = 1
opcache.memory_consumption = 64
opcache.max_accelerated_files = 4000
opcache.validate_timestamps = 1
opcache.validate_permission = 1
