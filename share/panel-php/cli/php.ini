; HestiaRE panel CLI PHP settings — loaded via bin/hestia-php (-c this file).
; Deployed to /etc/php/hestia/cli/php.ini. Kept deliberately small: the panel's
; CLI helpers (object/IP/domain validation, password hashing, app installer)
; only need predictable, self-contained behaviour independent of the system
; CLI ini. Add panel-specific overrides here, not in the system php.ini.
memory_limit = 256M
max_execution_time = 0
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = stderr
log_errors = Off
expose_php = Off
