# DSO module loading (mod_facl, and any distro-enabled modules). The stock
# proftpd.conf includes this; the upstream HestiaRE template dropped it and
# relied on statically-linked modules only. Kept for cross-distro robustness —
# verified none of deb12/13, ub24/26 enable mod_tls here (so no double-load with
# tls.conf's own LoadModule mod_tls.c) (#123).
Include /etc/proftpd/modules.conf

ServerName                      "FTP"
ServerIdent                     on "FTP Server ready."
ServerAdmin                     root@localhost
DefaultServer                   on
DefaultRoot                  ~ !adm

Include /etc/proftpd/tls.conf

<IfModule mod_vroot.c>
    VRootEngine                 on
    VRootAlias                  /etc/security/pam_env.conf etc/security/pam_env.conf
</IfModule>

AuthPAMConfig                   proftpd
AuthOrder                       mod_auth_pam.c* mod_auth_unix.c
UseReverseDNS                   off
User                            proftpd
Group                           nogroup
MaxInstances                    20
UseSendfile                     off
LogFormat                       default "%h %l %u %t \"%r\" %s %b"
LogFormat                       auth    "%v [%P] %h %t \"%r\" %s"
ListOptions                     -a
RequireValidShell               off
PassivePorts                    12000 12100

<Global>
  Umask                         002
  AllowOverwrite                yes
  <Limit ALL SITE_CHMOD>
    AllowAll
  </Limit>
</Global>

# Per-machine drop-ins. h-change-sys-ip-nat writes MasqueradeAddress here
# (conf.d/external_ip.conf) for passive FTP behind NAT; without this Include the
# stock config loaded it but the upstream HestiaRE template did not (#123).
Include /etc/proftpd/conf.d/
